<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: -0.5px;
    }

    header p {
      color: #6b7280;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"], input[type="url"] {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      color: #1a1a2e;
      background: #fafafa;
    }

    input[type="text"]:focus, input[type="url"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    input::placeholder { color: #9ca3af; }

    button.btn-add {
      width: 100%;
      padding: 0.7rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button.btn-add:hover { background: #4338ca; }
    button.btn-add:active { transform: scale(0.98); }

    .error-msg {
      font-size: 0.82rem;
      color: #ef4444;
      min-height: 1rem;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
    }

    .count-badge {
      background: #ede9fe;
      color: #4f46e5;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .bookmark-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bookmark-item:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.08);
    }

    .favicon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      border-radius: 3px;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url {
      font-size: 0.78rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }

    .bookmark-url:hover { color: #4f46e5; text-decoration: underline; }

    .btn-delete {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .btn-delete:hover { color: #ef4444; background: #fee2e2; }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #9ca3af;
    }

    .empty-state svg { margin-bottom: 0.75rem; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.25rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    #search-input::placeholder { color: #9ca3af; }

    select#input-folder {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      color: #1a1a2e;
      background: #fafafa;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select#input-folder:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    .folder-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .folder-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.75rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 999px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .folder-pill:hover { border-color: #c7d2fe; color: #4f46e5; background: #eef2ff; }

    .folder-pill.active {
      border-color: #4f46e5;
      background: #ede9fe;
      color: #4f46e5;
      font-weight: 600;
    }

    .folder-pill-new { border-style: dashed; color: #9ca3af; }
    .folder-pill-new:hover { border-color: #4f46e5; color: #4f46e5; background: #eef2ff; }

    .pill-x {
      font-size: 0.85rem;
      line-height: 1;
      color: #9ca3af;
      padding: 0 0.1rem;
      transition: color 0.15s;
    }

    .pill-x:hover { color: #ef4444; }

    .new-folder-row {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    #new-folder-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #new-folder-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    .btn-folder-confirm {
      padding: 0.5rem 0.9rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-folder-confirm:hover { background: #4338ca; }

    .btn-folder-cancel {
      padding: 0.5rem 0.75rem;
      background: none;
      color: #6b7280;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-folder-cancel:hover { border-color: #d1d5db; color: #374151; }

    .bm-folder-tag {
      display: inline-block;
      margin-left: 0.4rem;
      padding: 0.1rem 0.45rem;
      background: #ede9fe;
      color: #4f46e5;
      font-size: 0.7rem;
      font-weight: 500;
      border-radius: 999px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bookmark Manager</h1>
      <p>Save and organize your favorite links</p>
    </header>

    <!-- Add bookmark form -->
    <div class="card">
      <form id="bookmark-form" class="form-group" novalidate>
        <div class="input-row">
          <input type="text" id="input-title" placeholder="Title (e.g. GitHub)" autocomplete="off" />
          <input type="url" id="input-url" placeholder="https://example.com" autocomplete="off" />
        </div>
        <select id="input-folder">
          <option value="">No folder</option>
        </select>
        <div class="error-msg" id="error-msg"></div>
        <button type="submit" class="btn-add">Add Bookmark</button>
      </form>
    </div>

    <!-- Bookmarks list -->
    <div class="card">
      <div class="list-header">
        <h2>Saved Bookmarks</h2>
        <span class="count-badge" id="count-badge">0</span>
      </div>
      <div id="folder-bar" class="folder-bar"></div>
      <div class="new-folder-row" id="new-folder-row">
        <input type="text" id="new-folder-input" placeholder="Folder name…" autocomplete="off" maxlength="30" />
        <button type="button" class="btn-folder-confirm" id="new-folder-confirm">Add</button>
        <button type="button" class="btn-folder-cancel" id="new-folder-cancel">Cancel</button>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search bookmarks…" autocomplete="off" />
      </div>
      <ul class="bookmark-list" id="bookmark-list"></ul>
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" />
        </svg>
        <p id="empty-msg">No bookmarks yet. Add one above!</p>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bookmarks_v1';
    const FOLDERS_KEY = 'folders_v1';

    function loadBookmarks() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveBookmarks(bookmarks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function loadFolders() {
      try { return JSON.parse(localStorage.getItem(FOLDERS_KEY)) || []; }
      catch { return []; }
    }
    function saveFolders(folders) {
      localStorage.setItem(FOLDERS_KEY, JSON.stringify(folders));
    }

    let activeFolder = null; // null = "All"

    function faviconUrl(url) {
      try {
        const origin = new URL(url).origin;
        return `https://www.google.com/s2/favicons?domain=${origin}&sz=32`;
      } catch { return null; }
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function currentQuery() {
      return document.getElementById('search-input').value;
    }

    function renderFolderBar(folders) {
      const bar = document.getElementById('folder-bar');
      bar.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.type = 'button';
      allBtn.className = 'folder-pill' + (activeFolder === null ? ' active' : '');
      allBtn.dataset.folderId = '';
      allBtn.textContent = 'All';
      bar.appendChild(allBtn);

      folders.forEach((f) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'folder-pill' + (activeFolder === f.id ? ' active' : '');
        btn.dataset.folderId = f.id;
        btn.innerHTML = `${escHtml(f.name)}<span class="pill-x" data-delete-folder="${f.id}" title="Delete folder">&times;</span>`;
        bar.appendChild(btn);
      });

      const newBtn = document.createElement('button');
      newBtn.type = 'button';
      newBtn.className = 'folder-pill folder-pill-new';
      newBtn.id = 'new-folder-btn';
      newBtn.textContent = '+ Folder';
      bar.appendChild(newBtn);
    }

    function renderFolderSelect(folders) {
      const sel = document.getElementById('input-folder');
      const current = sel.value;
      sel.innerHTML = '<option value="">No folder</option>';
      folders.forEach((f) => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.name;
        sel.appendChild(opt);
      });
      if (current && folders.find((f) => f.id === current)) sel.value = current;
    }

    function render(query = '') {
      const bookmarks = loadBookmarks();
      const folders = loadFolders();
      const q = query.trim().toLowerCase();

      let filtered = activeFolder
        ? bookmarks.filter((bm) => bm.folderId === activeFolder)
        : bookmarks;
      if (q) filtered = filtered.filter((bm) => bm.title.toLowerCase().includes(q));

      const list = document.getElementById('bookmark-list');
      const empty = document.getElementById('empty-state');
      const badge = document.getElementById('count-badge');
      const emptyMsg = document.getElementById('empty-msg');

      badge.textContent = filtered.length;
      empty.style.display = filtered.length === 0 ? 'block' : 'none';

      if (filtered.length === 0) {
        const scopeHasAny = activeFolder
          ? bookmarks.some((bm) => bm.folderId === activeFolder)
          : bookmarks.length > 0;
        if (q && scopeHasAny) {
          emptyMsg.textContent = `No bookmarks match "${query}".`;
        } else if (activeFolder && !scopeHasAny) {
          emptyMsg.textContent = 'No bookmarks in this folder yet.';
        } else {
          emptyMsg.textContent = 'No bookmarks yet. Add one above!';
        }
      }

      list.innerHTML = '';

      filtered.forEach((bm) => {
        const li = document.createElement('li');
        li.className = 'bookmark-item';
        li.dataset.id = bm.id;

        const favicon = faviconUrl(bm.url);
        const imgTag = favicon
          ? `<img class="favicon" src="${favicon}" alt="" onerror="this.style.display='none'">`
          : '';

        const folder = folders.find((f) => f.id === bm.folderId);
        const folderTag = (!activeFolder && folder)
          ? `<span class="bm-folder-tag">${escHtml(folder.name)}</span>`
          : '';

        li.innerHTML = `
          ${imgTag}
          <div class="bookmark-info">
            <div class="bookmark-title" title="${escHtml(bm.title)}">${escHtml(bm.title)}${folderTag}</div>
            <a class="bookmark-url" href="${escHtml(bm.url)}" target="_blank" rel="noopener noreferrer"
               title="${escHtml(bm.url)}">${escHtml(bm.url)}</a>
          </div>
          <button class="btn-delete" aria-label="Delete bookmark" data-id="${bm.id}">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
          </button>`;

        list.appendChild(li);
      });

      renderFolderBar(folders);
      renderFolderSelect(folders);
    }

    function addBookmark(title, url) {
      const bookmarks = loadBookmarks();
      const folderId = document.getElementById('input-folder').value || null;
      bookmarks.unshift({ id: Date.now().toString(), title: title.trim(), url: url.trim(), folderId });
      saveBookmarks(bookmarks);
      render(currentQuery());
    }

    function deleteBookmark(id) {
      saveBookmarks(loadBookmarks().filter((bm) => bm.id !== id));
      render(currentQuery());
    }

    function addFolder(name) {
      const folders = loadFolders();
      folders.push({ id: Date.now().toString(), name: name.trim() });
      saveFolders(folders);
      render(currentQuery());
    }

    function deleteFolder(id) {
      saveFolders(loadFolders().filter((f) => f.id !== id));
      saveBookmarks(loadBookmarks().map((bm) => bm.folderId === id ? { ...bm, folderId: null } : bm));
      if (activeFolder === id) activeFolder = null;
      render(currentQuery());
    }

    // Form submission
    document.getElementById('bookmark-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const titleEl = document.getElementById('input-title');
      const urlEl = document.getElementById('input-url');
      const errorEl = document.getElementById('error-msg');

      const title = titleEl.value.trim();
      const url = urlEl.value.trim();

      if (!title && !url) { errorEl.textContent = 'Please enter a title and URL.'; return; }
      if (!title) { errorEl.textContent = 'Please enter a title.'; return; }
      if (!url) { errorEl.textContent = 'Please enter a URL.'; return; }

      try { new URL(url); } catch {
        errorEl.textContent = 'Please enter a valid URL (include https://).';
        return;
      }

      errorEl.textContent = '';
      addBookmark(title, url);
      titleEl.value = '';
      urlEl.value = '';
      titleEl.focus();
    });

    // Delete via event delegation
    document.getElementById('bookmark-list').addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-delete');
      if (btn) deleteBookmark(btn.dataset.id);
    });

    // Clear errors on input
    ['input-title', 'input-url'].forEach((id) => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('error-msg').textContent = '';
      });
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      render(e.target.value);
    });

    // Folder bar: pill click, delete, or new folder
    document.getElementById('folder-bar').addEventListener('click', (e) => {
      const delBtn = e.target.closest('[data-delete-folder]');
      if (delBtn) {
        e.stopPropagation();
        deleteFolder(delBtn.dataset.deleteFolder);
        return;
      }
      if (e.target.closest('#new-folder-btn')) {
        document.getElementById('new-folder-row').style.display = 'flex';
        document.getElementById('new-folder-input').focus();
        return;
      }
      const pill = e.target.closest('.folder-pill');
      if (pill && !pill.classList.contains('folder-pill-new')) {
        activeFolder = pill.dataset.folderId || null;
        render(currentQuery());
      }
    });

    document.getElementById('new-folder-confirm').addEventListener('click', () => {
      const input = document.getElementById('new-folder-input');
      const name = input.value.trim();
      if (!name) return;
      addFolder(name);
      input.value = '';
      document.getElementById('new-folder-row').style.display = 'none';
    });

    document.getElementById('new-folder-cancel').addEventListener('click', () => {
      document.getElementById('new-folder-input').value = '';
      document.getElementById('new-folder-row').style.display = 'none';
    });

    document.getElementById('new-folder-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('new-folder-confirm').click();
      if (e.key === 'Escape') document.getElementById('new-folder-cancel').click();
    });

    render();
  </script>
</body>
</html>
